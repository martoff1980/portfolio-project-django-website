{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Вхід у систему{% endblock %}
{% block content %}
  <div class="row justify-content-center mt-5">
    <div class="col-md-5">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <h3 class="card-title text-center mb-4">🔑 Вхід до Task Manager</h3>
          <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-dark">Увійти</button>
            </div>
          </form>
          <div class="text-center mt-3">
            <p class="text-muted small">Немає аккаунту? <a href="{% url 'task_manager:worker-create' %}">Зареєструватися</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
