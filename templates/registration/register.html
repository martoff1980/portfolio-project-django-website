{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Реєстрація працівника{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">👤 Реєстрація нового працівника</h3>
                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary">Зареєструватися</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <p class="text-muted small">Вже є аккаунт? <a href="{% url 'login' %}">Увійти</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
